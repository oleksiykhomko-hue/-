
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Юречко лох</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background-image: url("кабанчик.jpg");
            background-size: 70%;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #000000;

            display: flex;
            justify-content: center;
            align-items: center;

            font-family: Arial, sans-serif;
        }

        .left-photo,
        .right-photo {
            width: 220px;
            height: 250px;

            border: 10px solid gold;
            border-radius: 20px;

            box-shadow: 0 0 200px gold;

            background-size: cover;
            background-position: center;

            margin: 20px;
        }

        .left-photo {
            background-image: url("каб1.jpg");
        }

        .right-photo {
            background-image: url("каб2.jpg");
        }

        .container {
            background: rgba(255, 0, 0, 0.6);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 0 20px rgba(145, 255, 0, 0.5);
        }

        h1 {
            font-size: 48px;
            margin-bottom: 15px;
            text-shadow: 2px 2px 10px rgb(217, 255, 0);
        }

        p {
            font-size: 24px;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: #ffcc00;
            color: rgb(255, 0, 191);
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #ffd633;
        }
    </style>
</head>

<body>

    <div class="left-photo"></div>

    <div class="container">
        <h1>🐗 Привіт!</h1>
        <p>Юречко лох</p>
        <button>Став лосяру👍😂!</button>
    </div>

    <div class="right-photo"></div>

</body>
</html>
